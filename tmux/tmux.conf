set -g mouse on
setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

set-option -sg escape-time 10
set-option -g default-terminal "tmux-256color"

# Use the portable launcher so the repository root is exported correctly.
if-shell '[ -z "${PORTABLE_CONFIG_ROOT:-}" ]' \
  'display-message "portable-config: start tmux with ./bin/tmux-portable so the portable tmux runtime is exported correctly"'

if-shell '[ -z "${TMUX_PLUGIN_MANAGER_PATH:-}" ]' \
  'display-message "portable-config: TMUX_PLUGIN_MANAGER_PATH is unset; defaulting to ~/.tmux/plugins may break portability"'

if-shell "test -f \"${PORTABLE_CONFIG_ROOT}/tmux/plugins/tpm/tpm\"" \
  "run-shell '${PORTABLE_CONFIG_ROOT}/tmux/plugins/tpm/tpm'"
if-shell "test ! -f \"${PORTABLE_CONFIG_ROOT}/tmux/plugins/tpm/tpm\"" \
  'display-message "portable-config: TPM not found at tmux/plugins/tpm; run git submodule update --init --recursive"'
