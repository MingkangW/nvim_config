set -g mouse on
setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

set-option -sg escape-time 10
set-option -g default-terminal "tmux-256color"

# Use the portable launcher so the repository root is exported correctly.
if-shell '[ -z "${PORTABLE_CONFIG_ROOT:-}" ]' \
  'display-message "portable-config: start tmux with ./bin/tmux-portable for the vendored theme to load correctly"'

set -g @portable_tmux_theme "catppuccin"

if-shell "test -f \"${PORTABLE_CONFIG_ROOT}/tmux/themes/#{@portable_tmux_theme}.conf\"" \
  "run-shell 'tmux source-file \"${PORTABLE_CONFIG_ROOT}/tmux/themes/#{@portable_tmux_theme}.conf\"'"
if-shell "test ! -f \"${PORTABLE_CONFIG_ROOT}/tmux/themes/#{@portable_tmux_theme}.conf\"" \
  'display-message "portable-config: theme #{@portable_tmux_theme} not found under tmux/themes"'
